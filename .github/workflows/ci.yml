name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore apps/api/MedSync.sln
      - run: dotnet build apps/api/MedSync.sln --configuration Release --no-restore

  web:
    name: build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:web
      - run: npm run build:web

  e2e:
    name: e2e tests
    runs-on: ubuntu-latest
    if: ${{ vars.MEDSYNC_E2E_BASE_URL != '' && vars.MEDSYNC_E2E_API_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: npm run test:e2e
        env:
          MEDSYNC_E2E_BASE_URL: ${{ vars.MEDSYNC_E2E_BASE_URL }}
          MEDSYNC_E2E_API_URL: ${{ vars.MEDSYNC_E2E_API_URL }}
          MEDSYNC_E2E_PASSWORD: ${{ secrets.MEDSYNC_E2E_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report

  scans:
    name: dependency and secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
         fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
